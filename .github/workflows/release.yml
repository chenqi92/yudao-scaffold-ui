name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/tauri.conf.json
      - src-tauri/Cargo.toml
      - src-tauri/Cargo.lock
      - pnpm-lock.yaml
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  version:
    name: Check release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate versions
        id: version
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(node - <<'NODE'
          const fs = require('fs');
          const text = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const match = text.match(/^\[package\][\s\S]*?^version\s*=\s*"([^"]+)"/m);
          if (!match) process.exit(1);
          console.log(match[1]);
          NODE
          )"

          if [[ "$package_version" != "$tauri_version" || "$package_version" != "$cargo_version" ]]; then
            echo "Version mismatch: package.json=$package_version, tauri.conf.json=$tauri_version, Cargo.toml=$cargo_version" >&2
            exit 1
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$package_version" >> "$GITHUB_OUTPUT"

      - name: Check whether release tag exists
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Release tag $tag already exists; skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release tag $tag does not exist; publishing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Build and publish ${{ needs.version.outputs.tag }}
    needs: version
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: yudao-scaffold ${{ needs.version.outputs.tag }}
          releaseBody: See the Assets section below to download and install this version.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          assetNamePattern: '[name]-[version]-[platform]-[arch][setup].[ext]'
